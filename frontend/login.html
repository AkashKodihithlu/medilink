<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MediPredict — Log In</title>
<link rel="stylesheet" href="shared.css"/>
<style>
  .full-layout{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 64px);padding:40px 24px;}
  .right-pane{width:100%;display:flex;align-items:center;justify-content:center;padding:0;}

  .auth-card{
    background:var(--card);border-radius:20px;
    box-shadow:0 8px 40px rgba(14,165,233,.12),0 2px 8px rgba(0,0,0,.07);
    border:1px solid var(--border);padding:40px;width:100%;max-width:400px;
    animation:fadeUp .3s ease both;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .auth-card.shake{animation:shake .35s ease;}

  .auth-logo{display:flex;align-items:center;gap:8px;font-size:1.3rem;font-weight:800;margin-bottom:24px;}
  .auth-logo span{color:var(--teal);}
  .auth-logo svg{color:var(--teal);}
  .auth-title{font-size:1.4rem;font-weight:800;color:var(--navy);margin-bottom:4px;}
  .auth-sub{color:var(--muted);font-size:.9rem;margin-bottom:22px;}
  .auth-form{display:flex;flex-direction:column;gap:13px;}

  .input-wrap{position:relative;}
  .input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;transition:color .2s;}
  .input-wrap input{
    width:100%;padding:11px 38px;border:1.5px solid var(--border);
    border-radius:10px;font-family:inherit;font-size:.88rem;color:var(--navy);
    outline:none;transition:border-color .2s,box-shadow .2s;
  }
  .input-wrap input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,165,233,.1);}
  .input-wrap input:focus + .eye-btn ~ .input-icon,
  .input-wrap input:focus ~ .input-icon{color:var(--teal);}
  .input-wrap input::placeholder{color:#94a3b8;}
  .input-wrap input.invalid{border-color:#ef4444!important;box-shadow:0 0 0 3px rgba(239,68,68,.1)!important;}

  .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;padding:0;display:flex;align-items:center;transition:color .15s;}
  .eye-btn:hover{color:var(--navy);}

  .remember-row{display:flex;justify-content:space-between;align-items:center;font-size:.82rem;}
  .remember-row label{display:flex;align-items:center;gap:6px;color:var(--slate);cursor:pointer;}
  .remember-row a{color:var(--teal);font-weight:600;text-decoration:none;}

  .form-err-box{
    display:none;align-items:center;gap:8px;
    background:#fef2f2;border:1px solid #fecaca;border-radius:8px;
    padding:10px 14px;font-size:.8rem;color:#dc2626;
  }

  .auth-submit{
    padding:12px;background:var(--teal);color:#fff;border:none;border-radius:50px;
    font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;
    margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .auth-submit:hover:not(:disabled){background:var(--teal-dark);box-shadow:0 4px 14px rgba(14,165,233,.35);}
  .auth-submit:disabled{opacity:.65;cursor:not-allowed;}

  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .auth-footer{text-align:center;margin-top:18px;font-size:.84rem;color:var(--muted);}
  .auth-footer a{color:var(--teal);font-weight:600;text-decoration:none;}
</style>
</head>
<body>
<nav class="navbar">
  <a href="dashboard.html" class="nav-logo"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Medi</span>Predict</a>
  <div class="nav-links">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="patients.html" class="nav-link">Patients</a>
    <a href="doctors.html" class="nav-link">Doctors</a>
    <a href="allocate.html" class="nav-link">Allocator</a>
  </div>
  <div class="nav-actions"><a href="login.html" class="btn-outline">Log In</a><a href="signup.html" class="btn-primary">Register</a></div>
</nav>

<div class="full-layout">
  <div class="right-pane">
    <div class="auth-card" id="authCard">
      <div class="auth-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Medi</span>Predict
      </div>
      <div class="auth-title">Log in to your account</div>
      <div class="auth-sub">Enter your credentials to continue</div>

      <div class="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" autofocus/>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <svg class="input-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input id="loginPwd" type="password" placeholder="Enter your password" autocomplete="current-password"/>
            <button type="button" class="eye-btn" onclick="togglePwd('loginPwd',this)" tabindex="-1">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label><input type="checkbox"/> Remember me</label>
          <a href="#">Forgot password?</a>
        </div>

        <div class="form-err-box" id="loginErr">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="loginErrText"></span>
        </div>

        <button class="auth-submit" id="loginBtn" onclick="submitLogin()">
          <div class="spinner" id="loginSpinner"></div>
          <span id="loginBtnText">Log In →</span>
        </button>
      </div>

      <div class="auth-footer">Don't have an account? <a href="signup.html">Create one free</a></div>
    </div>
  </div>
</div>

<script>
const EYE_OPEN  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const EYE_CLOSE = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const hidden = input.type === 'password';
  input.type = hidden ? 'text' : 'password';
  btn.innerHTML = hidden ? EYE_CLOSE : EYE_OPEN;
}

function showErr(msg) {
  const box = document.getElementById('loginErr');
  document.getElementById('loginErrText').textContent = msg;
  box.style.display = 'flex';
  // Shake the card
  const card = document.getElementById('authCard');
  card.classList.remove('shake');
  void card.offsetWidth; // reflow to restart animation
  card.classList.add('shake');
}

function hideErr() {
  document.getElementById('loginErr').style.display = 'none';
}

function setLoading(on) {
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('loginSpinner');
  const text = document.getElementById('loginBtnText');
  btn.disabled = on;
  spinner.style.display = on ? 'block' : 'none';
  text.textContent = on ? 'Logging in…' : 'Log In →';
}

function submitLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  // Mark invalid fields
  document.getElementById('loginEmail').classList.toggle('invalid', !email || !emailRe.test(email));
  document.getElementById('loginPwd').classList.toggle('invalid', !pwd || pwd.length < 6);

  if (!email)                  { showErr('Please enter your email address.'); return; }
  if (!emailRe.test(email))    { showErr('Please enter a valid email address.'); return; }
  if (!pwd)                    { showErr('Please enter your password.'); return; }
  if (pwd.length < 6)          { showErr('Password must be at least 6 characters.'); return; }

  hideErr();
  setLoading(true);
  // Simulate a brief async call before redirecting
  setTimeout(() => { window.location = 'dashboard.html'; }, 800);
}

// Clear errors + invalid state on input
['loginEmail','loginPwd'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    document.getElementById(id).classList.remove('invalid');
    hideErr();
  });
});

// Enter key submits
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitLogin();
});
</script>
</body>
</html>
